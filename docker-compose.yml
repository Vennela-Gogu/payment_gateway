version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_DB: payment_gateway
      POSTGRES_USER: gateway_user
      POSTGRES_PASSWORD: gateway_pass
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gateway_user"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      DATABASE_URL: postgresql://gateway_user:gateway_pass@db:5432/payment_gateway
      REDIS_URL: redis://redis:6379/0
      TEST_MODE: "true"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.worker
    environment:
      DATABASE_URL: postgresql://gateway_user:gateway_pass@db:5432/payment_gateway
      REDIS_URL: redis://redis:6379/0
      TEST_MODE: "true"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      api:
        condition: service_started

  checkout:
    build: ./checkout-page
    environment:
      VITE_API_BASE_URL: http://api:8000
    ports:
      - "3001:3000"
    depends_on:
      api:
        condition: service_started
